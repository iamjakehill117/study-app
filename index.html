<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>学習Wiki</title>
    <link rel="stylesheet" href="styles.css?v=20260626-mathsymbols" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">Cx</div>
          <div>
            <h1>学習Wiki</h1>
            <p>題材を分解し、必要な要素へ進みながら理解を深める。</p>
          </div>
        </div>

        <form class="topic-form" id="topicForm">
          <label class="sr-only" for="topicInput">題材</label>
          <input id="topicInput" type="text" value="CFD" autocomplete="off" />
          <button class="primary-button" type="submit">開く</button>
        </form>
      </header>

      <main class="layout">
        <aside class="sidebar" aria-label="文書一覧">
          <section class="panel">
            <div class="panel-heading">
              <h2>文書</h2>
              <button class="icon-button" id="newButton" type="button" title="題材入力へ" aria-label="題材入力へ">＋</button>
            </div>
            <input id="searchInput" type="search" placeholder="文書を検索" />
            <div class="doc-list" id="docList"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>概念リンク</h2>
              <span class="count" id="conceptCount">0</span>
            </div>
            <div class="concept-list" id="conceptList"></div>
          </section>
        </aside>

        <section class="reader" aria-label="本文">
          <div class="reader-toolbar">
            <div>
              <div class="breadcrumb" id="breadcrumb"></div>
              <h2 id="docTitle">文書を読み込み中</h2>
              <p id="docSummary"></p>
            </div>
            <div class="reader-actions">
              <button class="secondary-button" id="requestDocButton" type="button">この文書を深掘り</button>
              <button class="secondary-button" id="exportButton" type="button">書き出し</button>
            </div>
          </div>

          <div class="notice" id="notice" hidden></div>

          <section class="request-panel" id="requestPanel" hidden>
            <div class="request-callout" id="requestCallout" role="status" aria-live="polite">
              生成依頼を作成しました。
            </div>
            <div class="request-header">
              <div>
                <span class="eyebrow">Request</span>
                <h3 id="requestTitle">生成依頼</h3>
                <p id="requestMeta"></p>
              </div>
              <button class="icon-button" id="closeRequestButton" type="button" title="閉じる" aria-label="閉じる">×</button>
            </div>
            <textarea id="requestPrompt" rows="8" readonly></textarea>
            <div class="button-row">
              <button class="primary-button" id="copyRequestButton" type="button">依頼文をコピー</button>
              <button class="secondary-button" id="copyHashButton" type="button">URL依頼をコピー</button>
            </div>
            <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
          </section>

          <article class="document" id="documentBody"></article>

          <section class="element-section" id="elementSection">
            <div class="section-heading">
              <div>
                <h3>この解説を理解するための細かい要素</h3>
                <p>文書ありなら開きます。未作成の要素は深掘り候補になります。</p>
              </div>
              <div class="bulk-actions" id="bulkActions">
                <span id="bulkSelectionCount">0件選択中</span>
                <button class="secondary-button" id="clearElementSelectionButton" type="button">解除</button>
                <button class="primary-button" id="bulkRequestButton" type="button">まとめて生成依頼</button>
              </div>
            </div>
            <div class="element-list" id="elementList"></div>
          </section>
        </section>

        <aside class="inspector" aria-label="文書情報">
          <section class="panel">
            <h2>現在の文書</h2>
            <dl class="meta-list">
              <div>
                <dt>文書ID</dt>
                <dd id="metaId">-</dd>
              </div>
              <div>
                <dt>親文書</dt>
                <dd id="metaParents">-</dd>
              </div>
              <div>
                <dt>子文書</dt>
                <dd id="metaChildren">-</dd>
              </div>
              <div>
                <dt>更新</dt>
                <dd id="metaUpdated">-</dd>
              </div>
            </dl>
          </section>

        </aside>
      </main>
    </div>

    <script src="data.js?v=20260626-mathsymbols"></script>
    <script src="app.js?v=20260626-mathsymbols"></script>
  </body>
</html>
