name: Deploy encrypted site to public Pages repository

on:
  push:
    branches:
      - main
    paths:
      - "app.js"
      - "styles.css"
      - "data.js"
      - "private_index.html"
      - "private-loader.js"
      - "encrypt-data.mjs"
      - "build-private-site.mjs"
      - ".github/workflows/deploy-public-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-public-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build encrypted private site
        env:
          STUDY_WIKI_PASSWORD: ${{ secrets.STUDY_WIKI_PASSWORD }}
        run: node build-private-site.mjs

      - name: Add Pages marker files
        run: |
          touch private_site/.nojekyll
          cat > private_site/README.md <<'EOF'
          This repository is automatically generated from the private study app repository.
          Do not edit these files directly.
          EOF

      - name: Publish to public repository
        env:
          PUBLIC_PAGES_REPO: ${{ secrets.PUBLIC_PAGES_REPO }}
          PUBLIC_PAGES_TOKEN: ${{ secrets.PUBLIC_PAGES_TOKEN }}
        run: |
          if [ -z "$PUBLIC_PAGES_REPO" ]; then
            echo "PUBLIC_PAGES_REPO secret is required. Example: your-name/study-app-pages"
            exit 1
          fi

          if [ -z "$PUBLIC_PAGES_TOKEN" ]; then
            echo "PUBLIC_PAGES_TOKEN secret is required."
            exit 1
          fi

          cd private_site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy encrypted study site"
          git branch -M main
          git remote add origin "https://x-access-token:${PUBLIC_PAGES_TOKEN}@github.com/${PUBLIC_PAGES_REPO}.git"
          git push --force origin main
